<!DOCTYPE html>
<html>
<head>
    <title>Music Genre Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🎵 AI Music Genre Classifier</h1>
    <p class="subtitle">Upload a WAV file and let AI detect the genre</p>

    <form action="/predict" method="POST" enctype="multipart/form-data">

        <div class="upload-box">
            <input type="file" name="file" accept=".wav" required>
            <p>Drag & Drop or Click to Upload</p>
        </div>

        <button type="submit">Predict Genre</button>

    </form>

    {% if genre %}
    <div class="result-card">

        <h2>Prediction Result</h2>

        <p class="genre">{{ genre }}</p>

        <div class="confidence">
            <div class="bar classical">Classical</div>
            <div class="bar rock">Rock</div>
            <div class="bar jazz">Jazz</div>
            <div class="bar pop">Pop</div>
        </div>

    </div>
    {% endif %}

</div>
<script>
const fileInput = document.getElementById("file-upload");
const fileName = document.getElementById("file-name");

fileInput.addEventListener("change", function(){
    fileName.textContent = fileInput.files[0].name;
});
</script>

</body>
</html>
